<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="600" y="50" font-size="32" font-weight="bold" fill="#06b6d4" text-anchor="middle" font-family="Orbitron">
    IoT MINING SAFETY SYSTEM
  </text>
  <text x="600" y="90" font-size="28" font-weight="bold" fill="#06b6d4" text-anchor="middle" font-family="Orbitron">
    LAYERED ARCHITECTURE
  </text>

  <!-- Layer 1: Sensing Layer -->
  <g id="sensing-layer">
    <rect x="50" y="500" width="1100" height="200" fill="rgba(6,182,212,0.1)" stroke="#06b6d4" stroke-width="2" rx="10"/>
    <text x="600" y="530" font-size="20" font-weight="bold" fill="#06b6d4" text-anchor="middle">SENSING LAYER (UNDERGROUND MINE)</text>
    
    <circle cx="150" cy="650" r="40" fill="rgba(122,185,255,0.3)" stroke="#7ab9ff"/>
    <text x="150" y="660" font-size="12" fill="#fff" text-anchor="middle">Gas</text>
    
    <circle cx="300" cy="650" r="40" fill="rgba(122,185,255,0.3)" stroke="#7ab9ff"/>
    <text x="300" y="660" font-size="12" fill="#fff" text-anchor="middle">Temp</text>
    
    <circle cx="450" cy="650" r="40" fill="rgba(122,185,255,0.3)" stroke="#7ab9ff"/>
    <text x="450" y="660" font-size="12" fill="#fff" text-anchor="middle">Humidity</text>
    
    <circle cx="600" cy="650" r="40" fill="rgba(122,185,255,0.3)" stroke="#7ab9ff"/>
    <text x="600" y="660" font-size="12" fill="#fff" text-anchor="middle">Motion</text>
    
    <circle cx="750" cy="650" r="40" fill="rgba(122,185,255,0.3)" stroke="#7ab9ff"/>
    <text x="750" y="660" font-size="12" fill="#fff" text-anchor="middle">Location</text>
    
    <circle cx="900" cy="650" r="40" fill="rgba(122,185,255,0.3)" stroke="#7ab9ff"/>
    <text x="900" y="660" font-size="12" fill="#fff" text-anchor="middle">Heart Rate</text>
  </g>

  <!-- Layer 2: Processing Layer -->
  <g id="processing-layer">
    <rect x="50" y="350" width="1100" height="100" fill="rgba(165,142,251,0.1)" stroke="#a58efb" stroke-width="2" rx="10"/>
    <text x="600" y="375" font-size="18" font-weight="bold" fill="#a58efb" text-anchor="middle">PROCESSING LAYER (MICROCONTROLLER & EDGE COMPUTING)</text>
    
    <rect x="150" y="390" width="80" height="40" fill="rgba(165,142,251,0.3)" stroke="#a58efb" rx="5"/>
    <text x="190" y="415" font-size="11" fill="#fff" text-anchor="middle">Arduino</text>
    
    <rect x="280" y="390" width="80" height="40" fill="rgba(165,142,251,0.3)" stroke="#a58efb" rx="5"/>
    <text x="320" y="415" font-size="11" fill="#fff" text-anchor="middle">Processor</text>
    
    <rect x="410" y="390" width="80" height="40" fill="rgba(165,142,251,0.3)" stroke="#a58efb" rx="5"/>
    <text x="450" y="415" font-size="11" fill="#fff" text-anchor="middle">Data Filter</text>
    
    <rect x="540" y="390" width="80" height="40" fill="rgba(165,142,251,0.3)" stroke="#a58efb" rx="5"/>
    <text x="580" y="415" font-size="11" fill="#fff" text-anchor="middle">Algorithm</text>
    
    <rect x="670" y="390" width="80" height="40" fill="rgba(165,142,251,0.3)" stroke="#a58efb" rx="5"/>
    <text x="710" y="415" font-size="11" fill="#fff" text-anchor="middle">Alert Logic</text>
  </g>

  <!-- Layer 3: Communication Layer -->
  <g id="communication-layer">
    <rect x="50" y="200" width="1100" height="120" fill="rgba(34,197,94,0.1)" stroke="#22c55e" stroke-width="2" rx="10"/>
    <text x="600" y="225" font-size="18" font-weight="bold" fill="#22c55e" text-anchor="middle">COMMUNICATION LAYER (LORA GATEWAY & NETWORK)</text>
    
    <rect x="250" y="250" width="300" height="50" fill="rgba(34,197,94,0.2)" stroke="#22c55e" rx="5"/>
    <text x="400" y="280" font-size="13" fill="#22c55e" font-weight="bold" text-anchor="middle">LoRa Wireless Communication</text>
    
    <rect x="650" y="250" width="250" height="50" fill="rgba(34,197,94,0.2)" stroke="#22c55e" rx="5"/>
    <text x="775" y="280" font-size="13" fill="#22c55e" font-weight="bold" text-anchor="middle">Long-Range Network</text>
  </g>

  <!-- Layer 4: Monitoring Layer -->
  <g id="monitoring-layer">
    <rect x="50" y="50" width="1100" height="130" fill="rgba(251,146,60,0.1)" stroke="#fb923c" stroke-width="2" rx="10"/>
    <text x="600" y="80" font-size="18" font-weight="bold" fill="#fb923c" text-anchor="middle">MONITORING LAYER (SUPERVISOR STATION)</text>
    
    <rect x="100" y="100" width="200" height="60" fill="rgba(251,146,60,0.2)" stroke="#fb923c" rx="5"/>
    <text x="200" y="130" font-size="11" fill="#fb923c" text-anchor="middle">Real-Time Dashboard</text>
    
    <rect x="350" y="100" width="180" height="60" fill="rgba(251,146,60,0.2)" stroke="#fb923c" rx="5"/>
    <text x="440" y="130" font-size="11" fill="#fb923c" text-anchor="middle">Mine Map & Alerts</text>
    
    <rect x="600" y="100" width="180" height="60" fill="rgba(251,146,60,0.2)" stroke="#fb923c" rx="5"/>
    <text x="690" y="130" font-size="11" fill="#fb923c" text-anchor="middle">Historical Data</text>
    
    <rect x="850" y="100" width="180" height="60" fill="rgba(251,146,60,0.2)" stroke="#fb923c" rx="5"/>
    <text x="940" y="130" font-size="11" fill="#fb923c" text-anchor="middle">Emergency Response</text>
  </g>

  <!-- Arrows showing data flow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#06b6d4"/>
    </marker>
  </defs>

  <path d="M 200 500 L 200 470" stroke="#fb923c" stroke-width="3" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 400 500 L 400 470" stroke="#fb923c" stroke-width="3" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 600 500 L 600 470" stroke="#fb923c" stroke-width="3" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 800 500 L 800 470" stroke="#fb923c" stroke-width="3" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>

  <path d="M 300 350 L 300 320" stroke="#06b6d4" stroke-width="3" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 600 350 L 600 320" stroke="#06b6d4" stroke-width="3" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <path d="M 900 350 L 900 320" stroke="#06b6d4" stroke-width="3" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
</svg>
